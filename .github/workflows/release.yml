name: release

# Publishes all npm packages when a version tag (v1.2.3) is pushed, using npm
# TRUSTED PUBLISHING (OIDC) — no long-lived NPM_TOKEN secret, and provenance is
# attached automatically.
#
# One-time setup on npmjs.com — for EACH published package add a Trusted
# Publisher (package → Settings → Trusted Publishing) pointing at:
#     Provider:   GitHub Actions
#     Owner:      daforester
#     Repository: goleo
#     Workflow:   release.yml
# Packages: @goleo/bridge, @goleo/cli, create-goleo-app, and the six
# @goleo/cli-<os>-<arch> platform packages. See RELEASING.md (incl. the
# first-publish bootstrap for brand-new package names).
#
# Cross-compiles every platform binary CGO_ENABLED=0 from this one Linux runner
# (the glaze webview backend is cgo-free), so no per-OS runners are needed.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm trusted publishing (OIDC) + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      # Trusted publishing (OIDC token exchange) needs npm >= 11.5.1; Node 22
      # ships npm 10, so upgrade explicitly.
      - name: Use latest npm (trusted publishing / OIDC)
        run: npm install -g npm@latest

      - name: Install workspace dependencies
        run: npm install

      - name: Build TypeScript packages
        run: |
          npm run build:bridge
          npm run build:create-app

      - name: Bundle Go source + build platform binary packages
        run: |
          node cli/npm/copy-source.js
          node cli/npm/build-platform-packages.js

      # Platform packages first, so @goleo/cli's optionalDependencies resolve for
      # anyone installing it immediately after. No NODE_AUTH_TOKEN: `npm publish`
      # performs the OIDC exchange automatically when a trusted publisher is set.
      - name: Publish @goleo/cli-* platform packages
        run: node cli/npm/publish-platform-packages.js

      - name: Publish @goleo/cli
        run: npm publish -w cli/npm

      - name: Publish @goleo/bridge
        run: npm publish -w bridge

      - name: Publish create-goleo-app
        run: npm publish -w create-goleo-app
