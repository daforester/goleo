name: ci

on:
  push:
    branches-ignore: [ "spike/**" ]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # All third-party deps are committed under vendor/ so builds never depend
      # on upstream repos staying online. Fail if vendor/ has drifted from go.mod
      # (a dep bumped without re-running scripts/update-vendor). Only the root
      # module is checked: cli/npm/goleo is a generated copy of it (produced by
      # cli/npm/copy-source.js at build/publish time), not committed source.
      - name: Vendor is consistent
        run: |
          go mod vendor && git diff --exit-code -- vendor go.mod go.sum \
            || { echo "::error::root vendor/ is stale — run scripts/update-vendor"; exit 1; }

      # Windows uses the cgo-free go-webview2 backend, so this cross-builds from
      # Linux without a C toolchain or platform libraries.
      - name: Windows build (cgo-free)
        run: CGO_ENABLED=0 GOOS=windows go build ./runtime/...

      # macOS/Linux now default to the cgo-free glaze backend, so the whole
      # desktop matrix must cross-build CGO_ENABLED=0 from Linux with no tags.
      # Interactive UX is verified on real hardware by glaze-verify.yml.
      - name: Desktop build (cgo-free, default glaze backend)
        run: |
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build ./runtime/...
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build ./runtime/...
          CGO_ENABLED=0 GOOS=linux  GOARCH=amd64 go build ./runtime/...
          CGO_ENABLED=0 GOOS=linux  GOARCH=arm64 go build ./runtime/...

      # Cross-LINK a real executable per desktop OS. `go build ./runtime/...`
      # only compiles a library and never links, so it misses link-time errors
      # like the glaze/systray fakecgo _cgo_init duplicate on Mach-O. Building the
      # runtime-verify app links Mach-O/PE/ELF from Linux with no Mac needed.
      - name: Desktop executable cross-link (all OSes, cgo-free)
        working-directory: spikes/glaze-runtime-verify
        run: |
          CGO_ENABLED=0 GOOS=darwin  GOARCH=arm64 go build -o /dev/null .
          CGO_ENABLED=0 GOOS=darwin  GOARCH=amd64 go build -o /dev/null .
          CGO_ENABLED=0 GOOS=linux   GOARCH=amd64 go build -o /dev/null .
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -o /dev/null .

      # Mobile-safety guard: replicate the gomobile compile set on the REAL
      # mobile targets (GOOS=android/ios) with -tags mobilebuild. All desktop
      # webview/window/tray code and desktop-only feature impls must be excluded
      # (the stub is used); if any leaks in, this fails fast. The feature tag
      # exercises a device-feature mobile provider path too.
      #
      # NOTE: this must target android/ios, not the host GOOS. `linux +
      # mobilebuild` is an unreal combination that trips over cgo-only desktop
      # files (e.g. camera_linux.go) and says nothing about mobile safety.
      - name: Mobile guard — android
        run: |
          CGO_ENABLED=0 GOOS=android GOARCH=arm64 go build -tags mobilebuild ./runtime/...
          CGO_ENABLED=0 GOOS=android GOARCH=arm64 go build -tags "mobilebuild goleo_share" ./runtime/...

      - name: Mobile guard — ios
        run: |
          CGO_ENABLED=0 GOOS=ios GOARCH=arm64 go build -tags mobilebuild ./runtime/...
          CGO_ENABLED=0 GOOS=ios GOARCH=arm64 go build -tags "mobilebuild goleo_share" ./runtime/...

      - name: CLI build
        run: go build ./cli/...
