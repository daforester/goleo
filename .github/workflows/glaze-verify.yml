name: glaze-webview-verify

# Validates the cgo-free (purego) glaze WKWebView / WebKitGTK backend with a live
# JS<->Go round-trip on real macOS + Linux hardware — the hardware-gated step
# before flipping the pure-Go webview from opt-in (-tags goleo_glaze) to default.
# Runs on its spike branch and on manual dispatch (it opens a GUI window).
on:
  push:
    branches: [ "spike/glaze-webview" ]
  workflow_dispatch:

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14        # Apple Silicon (arm64) — real WKWebView
            display: false
          - os: ubuntu-latest   # WebKitGTK under xvfb
            display: true
          # macos-13 (Intel/amd64) is intentionally omitted: GitHub is retiring
          # Intel macOS runners, so that job queues indefinitely. amd64-macOS is
          # the same purego/objc code path as arm64 (verified here) and stays
          # compile-guarded in ci.yml. Re-add `- {os: macos-13, display: false}`
          # if/when an Intel runner is available and you want the live check.
    runs-on: ${{ matrix.os }}
    name: glaze-${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: spikes/glaze-webview/go.mod

      # Linux: glaze dlopens the system WebKitGTK/GTK at runtime, so the shared
      # libraries must be present (no C toolchain needed — build stays cgo-free).
      # Package names drift across Ubuntu releases; adjust if a lib is missing.
      - name: Linux runtime deps
        if: matrix.display
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libgtk-3-0 libglib2.0-0 \
            libwebkit2gtk-4.1-0 || sudo apt-get install -y libwebkit2gtk-4.0-37 || true

      - name: Build verify (CGO_ENABLED=0)
        working-directory: spikes/glaze-webview/verify
        run: CGO_ENABLED=0 go build -o glazeverify .

      - name: Run verify (JS<->Go round-trip)
        working-directory: spikes/glaze-webview/verify
        timeout-minutes: 3
        run: |
          if [ "${{ matrix.display }}" = "true" ]; then
            xvfb-run -a ./glazeverify
          else
            ./glazeverify
          fi

      # Multi-window: two live windows under one run loop (the model macOS needs,
      # since AppKit is main-thread-only). Proves the 2nd window can be opened
      # dynamically via Dispatch after the primary loop is running.
      - name: Build multi-window spike (CGO_ENABLED=0)
        working-directory: spikes/glaze-multiwindow
        run: CGO_ENABLED=0 go build -o glazemw .

      - name: Run multi-window spike (2 windows, 1 loop)
        working-directory: spikes/glaze-multiwindow
        timeout-minutes: 3
        run: |
          if [ "${{ matrix.display }}" = "true" ]; then
            xvfb-run -a ./glazemw
          else
            ./glazemw
          fi

      # Runtime-level: a REAL goleo app exercising the actual integration —
      # native IPC + the WebKitGTK permission auto-grant shim + mainLoopWindowManager
      # (2nd window via App.OpenWindow). This is what validates the shim (the raw
      # spikes can't, since it lives in the runtime).
      - name: Build runtime-stack verify (CGO_ENABLED=0)
        working-directory: spikes/glaze-runtime-verify
        run: CGO_ENABLED=0 go build -o glazert .

      - name: Run runtime-stack verify (native IPC + perm shim + in-proc 2nd window)
        working-directory: spikes/glaze-runtime-verify
        timeout-minutes: 3
        run: |
          if [ "${{ matrix.display }}" = "true" ]; then
            xvfb-run -a ./glazert
          else
            ./glazert
          fi

      # System tray: macOS uses the purego/objc NSStatusItem backend (must link
      # alongside glaze without the goffi/purego fakecgo collision); Linux uses
      # gogpu/systray. A Background app builds a tray, runs the loop, self-quits.
      - name: Build tray verify (CGO_ENABLED=0)
        working-directory: spikes/glaze-tray-verify
        run: CGO_ENABLED=0 go build -o glazetray .

      - name: Run tray verify (native tray, cgo-free)
        working-directory: spikes/glaze-tray-verify
        timeout-minutes: 3
        run: |
          if [ "${{ matrix.display }}" = "true" ]; then
            xvfb-run -a ./glazetray
          else
            ./glazetray
          fi

      # Native menu bar: macOS builds/installs an NSMenu (purego/objc); Linux has
      # no native menu (the app just runs windowed). Exercises roles, accelerator,
      # separator, submenu, and a custom OnClick.
      - name: Build menu verify (CGO_ENABLED=0)
        working-directory: spikes/glaze-menu-verify
        run: CGO_ENABLED=0 go build -o glazemenu .

      - name: Run menu verify (native menu bar, cgo-free)
        working-directory: spikes/glaze-menu-verify
        timeout-minutes: 3
        run: |
          if [ "${{ matrix.display }}" = "true" ]; then
            xvfb-run -a ./glazemenu
          else
            ./glazemenu
          fi

      # Custom-scheme SECURE CONTEXT: does a portless custom origin still get a
      # secure context? macOS (WKURLSchemeHandler) is the gating unknown — there
      # is no public "register scheme as secure" API, unlike Linux
      # (register_uri_scheme_as_secure) and Windows (https vhost). PASS here means
      # the uniform all-platforms goleo:// PR is viable.
      - name: Build scheme secure-context spike (CGO_ENABLED=0)
        working-directory: spikes/glaze-scheme-secure
        run: CGO_ENABLED=0 go build -o glazescheme .

      - name: Run scheme secure-context spike
        working-directory: spikes/glaze-scheme-secure
        timeout-minutes: 3
        run: |
          if [ "${{ matrix.display }}" = "true" ]; then
            xvfb-run -a ./glazescheme
          else
            ./glazescheme
          fi

  # Windows arm of the secure-context spike: WebView2 +
  # SetVirtualHostNameToFolderMapping over an https virtual host. windows-latest
  # ships the WebView2 runtime (Edge), so this runs the exe directly.
  windows-scheme:
    runs-on: windows-latest
    name: glaze-windows-scheme
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: spikes/glaze-scheme-secure/go.mod
      - name: Build scheme secure-context spike (CGO_ENABLED=0)
        working-directory: spikes/glaze-scheme-secure
        run: CGO_ENABLED=0 go build -o glazescheme.exe .
      - name: Run scheme secure-context spike (WebView2 virtual host)
        working-directory: spikes/glaze-scheme-secure
        timeout-minutes: 3
        run: ./glazescheme.exe

  # GTK4 / webkitgtk-6.0: glaze selects the GTK4 backend when 6.0 is present,
  # exercising menu_linux.go's GMenu/GtkPopoverMenuBar path (GtkMenuBar is gone
  # in GTK4). WebKitGTK 6.0 needs a session bus and its sandbox disabled in CI.
  linux-gtk4:
    runs-on: ubuntu-latest
    name: glaze-linux-gtk4
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: spikes/glaze-menu-verify/go.mod
      - name: GTK4 runtime deps
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb dbus dbus-x11 libgtk-4-1 libglib2.0-0 \
            libwebkitgtk-6.0-4 || sudo apt-get install -y libwebkitgtk-6.0-4t64 || true
      - name: Build menu verify (CGO_ENABLED=0)
        working-directory: spikes/glaze-menu-verify
        run: CGO_ENABLED=0 go build -o glazemenu .
      - name: Run menu verify under GTK4
        working-directory: spikes/glaze-menu-verify
        timeout-minutes: 3
        env:
          WEBKIT_DISABLE_SANDBOX_THIS_IS_DANGEROUS: "1"
        run: dbus-run-session -- xvfb-run -a ./glazemenu
      - name: Build scheme secure-context spike (CGO_ENABLED=0)
        working-directory: spikes/glaze-scheme-secure
        run: CGO_ENABLED=0 go build -o glazescheme .
      - name: Run scheme secure-context spike under GTK4
        working-directory: spikes/glaze-scheme-secure
        timeout-minutes: 3
        env:
          WEBKIT_DISABLE_SANDBOX_THIS_IS_DANGEROUS: "1"
        run: dbus-run-session -- xvfb-run -a ./glazescheme
